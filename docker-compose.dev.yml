version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: asg-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: asg_user
      POSTGRES_PASSWORD: asg_password
      POSTGRES_DB: asg_content
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asg_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7
    container_name: asg-mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: asg_user
      MONGO_INITDB_ROOT_PASSWORD: asg_password
      MONGO_INITDB_DATABASE: asg_content
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: asg-redis
    ports:
      - "6382:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  mongo_data:
  redis_data:
